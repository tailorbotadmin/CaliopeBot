name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-worker/requirements.txt
      - run: pip install ruff
      - run: ruff check ai-worker/ --select=E9,F7,F8 --ignore=F401
        continue-on-error: true

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npx eslint src/

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-worker/requirements.txt
      - run: cd ai-worker && pip install -r requirements.txt
      - run: cd ai-worker && python -m pytest tests/ -v --tb=short

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  test-e2e:
    runs-on: ubuntu-latest
    needs: lint-frontend
    continue-on-error: true   # E2E requires live Firebase Auth — treated as advisory
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install python-docx for fixture
        run: pip install python-docx

      - name: Create docx fixture
        run: |
          mkdir -p tests/fixtures
          python3 -c "
          from docx import Document
          doc = Document()
          doc.add_heading('Manuscrito de Prueba E2E', 0)
          doc.add_paragraph('Este es el primer parrafo del manuscrito de prueba.')
          doc.add_paragraph('El equipo han decidido viajar a Madrid.')
          doc.add_paragraph('Habian muchas personas esperando.')
          doc.save('tests/fixtures/sample.docx')
          print('Fixture created')
          "

      - name: Start Next.js dev server
        run: npx next dev &
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXTAUTH_URL: http://localhost:3000
          NODE_OPTIONS: "--max-old-space-size=2048"

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright E2E tests
        run: npx playwright test tests/import-manuscript.spec.ts
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
