name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  AR_REPO: caliopebot
  AI_WORKER_SERVICE: caliopebot-ai-worker
  WEB_SERVICE: caliopebot-web

jobs:
  deploy-ai-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      worker_url: ${{ steps.get_url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push ai-worker
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.AI_WORKER_SERVICE }}:${{ github.sha }} \
            ./ai-worker
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.AI_WORKER_SERVICE }}:${{ github.sha }}

      - name: Deploy ai-worker to Cloud Run
        run: |
          gcloud run deploy ${{ env.AI_WORKER_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.AI_WORKER_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 4Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars "ENVIRONMENT=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_LOCATION=${{ env.REGION }}" \
            --allow-unauthenticated

      - name: Get AI worker service URL
        id: get_url
        run: |
          URL=$(gcloud run services describe ${{ env.AI_WORKER_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ AI Worker URL: $URL"

      - name: Health-check AI worker
        run: |
          URL="${{ steps.get_url.outputs.url }}"
          echo "Checking $URL/api/v1/health ..."
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL/api/v1/health")
            echo "Attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ AI Worker is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ AI Worker health check did not return 200 after 5 attempts"
          exit 1

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-ai-worker        # waits for worker URL
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push web
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ needs.deploy-ai-worker.outputs.worker_url }}" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }} \
            ./web
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }}

      - name: Deploy web to Cloud Run
        run: |
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ needs.deploy-ai-worker.outputs.worker_url }}" \
            --allow-unauthenticated

      - name: Deploy Firebase Hosting (rewrite → Cloud Run)
        run: |
          firebase deploy --only hosting \
            --project ${{ env.PROJECT_ID }} \
            --non-interactive

      - name: Apply Firebase Storage CORS
        run: |
          gsutil cors set cors.json \
            gs://${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          echo "✅ CORS aplicado al bucket de Storage"
          gsutil cors get gs://${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
