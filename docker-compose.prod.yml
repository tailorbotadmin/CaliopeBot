version: "3.9"

services:
  languagetool:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    environment:
      - Java_Xms=256m
      - Java_Xmx=768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 30s
      timeout: 10s
      retries: 5

  chromadb:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-worker:
    restart: always
    volumes: []  # No dev mounts in prod
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
