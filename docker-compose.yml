version: "3.9"

services:
  languagetool:
    image: erikvl87/languagetool
    ports:
      - "8010:8010"
    environment:
      - Java_Xms=256m
      - Java_Xmx=512m
    networks:
      - caliope
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 30s
      timeout: 10s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    networks:
      - caliope

  ai-worker:
    build: ./ai-worker
    ports:
      - "8000:8000"
    env_file:
      - ./ai-worker/.env
    environment:
      - LANGUAGETOOL_URL=http://languagetool:8010
    volumes:
      - ./ai-worker:/app  # Live reload in dev
    depends_on:
      - chromadb
      - languagetool
    networks:
      - caliope

  web:
    build: ./web
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    depends_on:
      - ai-worker
    networks:
      - caliope

volumes:
  chroma_data:

networks:
  caliope:
    driver: bridge
